substitutions:
  device_name: monitor-zbiornika
  friendly_name: Monitor zbiornika

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}

esp32:
  board: esp32dev
  framework:
    type: esp-idf
    advanced:
      sram1_as_iram: true

logger:
  level: INFO

api:
  encryption:
    key: !secret monitor_zbiornika_api_key

ota:
  - platform: esphome
    password: !secret monitor_zbiornika_ota_password

ethernet:
  type: LAN8720
  mdc_pin: GPIO23
  mdio_pin: GPIO18
  clk:
    pin: GPIO0
    mode: CLK_EXT_IN
  phy_addr: 1
  power_pin: GPIO16

web_server:
  port: 80
  version: 3
  sorting_groups:
    - id: sorting_group_tank
      name: "Zbiornik"
      sorting_weight: 10
    - id: sorting_group_flow
      name: "Przeplyw"
      sorting_weight: 20
    - id: sorting_group_service
      name: "Serwis"
      sorting_weight: 90

preferences:
  flash_write_interval: 10min

uart:
  id: tank_uart
  rx_pin: GPIO5
  tx_pin: GPIO17
  baud_rate: 9600
  stop_bits: 1
  debug:
    direction: RX
    dummy_receiver: true
    after:
      bytes: 4
    sequence:
      - lambda: |-
          static std::vector<uint8_t> buffer;
          buffer.insert(buffer.end(), bytes.begin(), bytes.end());

          while (buffer.size() >= 4) {
            if (buffer[0] != 0xFF) {
              buffer.erase(buffer.begin());
              continue;
            }

            const uint8_t high = buffer[1];
            const uint8_t low = buffer[2];
            const uint8_t checksum = buffer[3];
            const uint8_t expected = (0xFF + high + low) & 0xFF;

            if (checksum != expected) {
              buffer.erase(buffer.begin());
              continue;
            }

            const uint16_t distance_mm = (uint16_t(high) << 8) | low;
            const float distance_m = distance_mm <= 30 ? 0.0f : distance_mm / 1000.0f;
            id(odleglosc_w_zbiorniku).publish_state(distance_m);
            buffer.erase(buffer.begin(), buffer.begin() + 4);
          }

          if (buffer.size() > 16) {
            buffer.erase(buffer.begin(), buffer.end() - 4);
          }

one_wire:
  - platform: gpio
    id: ds18b20_bus
    pin:
      number: GPIO33
      mode:
        input: true
        pullup: true

globals:
  - id: przeplyw_wody_total_persisted_l
    type: float
    restore_value: true
    initial_value: '0.0'
  - id: przeplyw_wody_session_checkpoint_l
    type: float
    restore_value: false
    initial_value: '0.0'

interval:
  - interval: 60s
    then:
      - lambda: |-
          const float current_session_l = id(przeplyw_wody_sesja).state;
          if (isnan(current_session_l)) {
            return;
          }
          if (current_session_l < id(przeplyw_wody_session_checkpoint_l)) {
            id(przeplyw_wody_session_checkpoint_l) = current_session_l;
            return;
          }
          const float delta_l = current_session_l - id(przeplyw_wody_session_checkpoint_l);
          if (delta_l >= 1.0f) {
            id(przeplyw_wody_total_persisted_l) += delta_l;
            id(przeplyw_wody_session_checkpoint_l) = current_session_l;
          }

button:
  - platform: template
    name: "Reset przeplywu wody suma"
    id: reset_przeplywu_wody_suma
    web_server:
      sorting_group_id: sorting_group_service
      sorting_weight: 10
    on_press:
      - lambda: |-
          const float current_session_l = id(przeplyw_wody_sesja).state;
          id(przeplyw_wody_total_persisted_l) = 0.0f;
          id(przeplyw_wody_session_checkpoint_l) = isnan(current_session_l) ? 0.0f : current_session_l;
          id(przeplyw_wody_suma).publish_state(0.0f);

sensor:
  - platform: template
    name: "Odleglosc w zbiorniku"
    id: odleglosc_w_zbiorniku
    unit_of_measurement: "m"
    accuracy_decimals: 2
    device_class: distance
    state_class: measurement
    web_server:
      sorting_group_id: sorting_group_tank
      sorting_weight: 10
    filters:
      - throttle: 1s

  - platform: pulse_meter
    id: przeplyw_wody
    name: "Przeplyw wody"
    pin:
      number: GPIO32
      mode:
        input: true
        pullup: true
    internal_filter: 100us
    timeout: 10s
    unit_of_measurement: "L/min"
    accuracy_decimals: 2
    device_class: volume_flow_rate
    state_class: measurement
    web_server:
      sorting_group_id: sorting_group_flow
      sorting_weight: 10
    filters:
      - multiply: 0.0034722222
      - throttle_average: 5s
    total:
      name: "Przeplyw wody sesja"
      id: przeplyw_wody_sesja
      unit_of_measurement: "L"
      accuracy_decimals: 2
      device_class: volume
      state_class: total_increasing
      web_server:
        sorting_group_id: sorting_group_flow
        sorting_weight: 30
      filters:
        - multiply: 0.0034722222

  - platform: template
    id: przeplyw_wody_suma
    name: "Przeplyw wody suma"
    unit_of_measurement: "L"
    accuracy_decimals: 2
    device_class: volume
    state_class: total_increasing
    update_interval: 10s
    web_server:
      sorting_group_id: sorting_group_flow
      sorting_weight: 20
    lambda: |-
      const float current_session_l = id(przeplyw_wody_sesja).state;
      if (isnan(current_session_l)) {
        return id(przeplyw_wody_total_persisted_l);
      }
      if (current_session_l < id(przeplyw_wody_session_checkpoint_l)) {
        return id(przeplyw_wody_total_persisted_l);
      }
      return id(przeplyw_wody_total_persisted_l) + current_session_l - id(przeplyw_wody_session_checkpoint_l);

  - platform: dallas_temp
    one_wire_id: ds18b20_bus
    name: "Temperatura zbiornika 1"
    id: temperatura_zbiornika_1
    resolution: 12
    update_interval: 30s
    web_server:
      sorting_group_id: sorting_group_tank
      sorting_weight: 20
