substitutions:
  device_name: monitor-zbiornika
  friendly_name: Monitor zbiornika

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}

esp32:
  board: esp32dev
  framework:
    type: esp-idf

logger:

api:
  encryption:
    key: !secret monitor_zbiornika_api_key

ota:
  - platform: esphome
    password: !secret monitor_zbiornika_ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  power_save_mode: none
  fast_connect: true
  ap:
    ssid: "${friendly_name} Fallback"
    password: !secret monitor_zbiornika_ap_password

captive_portal:

web_server:
  port: 80

uart:
  id: tank_uart
  rx_pin: GPIO5
  tx_pin: GPIO17
  baud_rate: 9600
  stop_bits: 1

sensor:
  - platform: a02yyuw
    uart_id: tank_uart
    name: "Odleglosc w zbiorniku"
    id: odleglosc_w_zbiorniku
    unit_of_measurement: "m"
    accuracy_decimals: 2
    device_class: distance
    state_class: measurement
    filters:
      - throttle: 1s
